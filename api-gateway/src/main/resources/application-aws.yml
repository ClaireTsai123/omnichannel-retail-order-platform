server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: auth-route
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
            - id: user-route
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/api/catalog/**
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/cart/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            - id: fulfillment-service
              uri: lb://fulfillment-service
              predicates:
                - Path=/api/fulfillment/**
            - id: ledger-service
              uri: lb://ledger-service
              predicates:
                - Path=/api/ledger/**
            - id: promotion-service
              uri: lb://promotion-service
              predicates:
                - Path=/api/promotions/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowed-headers: ${CORS_ALLOWED_HEADERS:*}
                allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: api-gateway
    service: api-gateway
