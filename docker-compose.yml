services:
  mysql:
    image: mysql:8.0
    container_name: omnichannel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omnichannel-infra

  redis:
    image: redis:7.2-alpine
    container_name: omnichannel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omnichannel-infra

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: omnichannel-eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - omnichannel-infra

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: omnichannel-user-service
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - omnichannel-infra

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: omnichannel-catalog-service
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "${CATALOG_SERVICE_PORT:-8082}:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
