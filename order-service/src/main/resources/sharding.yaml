dataSources:
  ds0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    jdbcUrl: jdbc:mysql://$${MYSQL_HOST::localhost}:$${MYSQL_PORT::3306}/order_db_0?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: $${DB_USERNAME::}
    password: $${DB_PASSWORD::}

  ds1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    jdbcUrl: jdbc:mysql://$${MYSQL_HOST::localhost}:$${MYSQL_PORT::3306}/order_db_1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: $${DB_USERNAME::}
    password: $${DB_PASSWORD::}

rules:
  - !SHARDING
    tables:
      orders:
        actualDataNodes: ds${0..1}.orders
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: order-inline

      order_items:
        actualDataNodes: ds${0..1}.order_items
        databaseStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: orderitem-inline

      order_status_history:
        actualDataNodes: ds${0..1}.order_status_history
        databaseStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: orderstatushistory-inline

      processed_kafka_events:
        actualDataNodes: ds${0..1}.processed_kafka_events
        databaseStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: processedkafkaevent-inline

      order_fulfillment_status:
        actualDataNodes: ds${0..1}.order_fulfillment_status
        databaseStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: orderfulfillmentstatus-inline

    shardingAlgorithms:
      order-inline:
        type: INLINE
        props:
          algorithm-expression: ds${id % 2}

      orderitem-inline:
        type: INLINE
        props:
          algorithm-expression: ds${order_id % 2}

      orderstatushistory-inline:
        type: INLINE
        props:
          algorithm-expression: ds${order_id % 2}

      processedkafkaevent-inline:
        type: INLINE
        props:
          algorithm-expression: ds${order_id % 2}

      orderfulfillmentstatus-inline:
        type: INLINE
        props:
          algorithm-expression: ds${order_id % 2}

props:
  sql-show: true
